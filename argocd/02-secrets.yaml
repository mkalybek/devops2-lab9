apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: myapp-secrets
  namespace: argocd
  annotations:
    # Secrets must land BEFORE the workloads that mount them.
    argocd.argoproj.io/sync-wave: "-5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # This directory holds the SealedSecret manifests. Update repoURL to
    # whatever git host serves this `lab9` directory.
    repoURL: https://github.com/mkalybek/devops2-lab9.git
    targetRevision: main
    path: secrets
    directory:
      recurse: true
      include: "*.sealedsecret.yaml"
  destination:
    server: https://kubernetes.default.svc
    # SealedSecret objects carry their own target namespace in metadata;
    # this field is the Application's "home" namespace only.
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
